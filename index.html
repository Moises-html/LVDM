<title>Dashboard Oficial — Liga Escolar</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#050816;
    --bg2:#0b1026;

    --card:rgba(255,255,255,.05);
    --card-border:rgba(255,255,255,.08);

    --text:#f8fafc;
    --muted:#94a3b8;

    --primary:#7c3aed;
    --secondary:#2563eb;
    --cyan:#22d3ee;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Plus Jakarta Sans',sans-serif;
}

body{

    min-height:100vh;

    background:
    radial-gradient(circle at top left, rgba(124,58,237,.25), transparent 25%),
    radial-gradient(circle at bottom right, rgba(37,99,235,.20), transparent 25%),
    linear-gradient(135deg,var(--bg),var(--bg2));

    color:var(--text);

    overflow-x:hidden;

    padding:22px 16px 60px;

    position:relative;
}

body::before{

    content:'';

    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

    background-size:40px 40px;

    pointer-events:none;
}

.container{
    width:100%;
    max-width:1200px;
    margin:auto;
}

/* HEADER */

.brand-header{

    position:relative;

    overflow:hidden;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(24px);

    border-radius:38px;

    padding:45px 35px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    gap:30px;

    margin-bottom:35px;
}

.brand-header::before{

    content:'';

    position:absolute;
    inset:0;

    background:
    linear-gradient(
    90deg,
    rgba(124,58,237,.18),
    transparent);

    pointer-events:none;
}

.brand-left{
    display:flex;
    align-items:center;
    gap:22px;
    position:relative;
    z-index:2;
}

.logo-wrapper{

    width:110px;
    height:110px;

    border-radius:30px;

    padding:4px;

    background:
    linear-gradient(
    145deg,
    rgba(124,58,237,.7),
    rgba(37,99,235,.5));

    box-shadow:
    0 0 30px rgba(124,58,237,.35);
}

.league-logo{

    width:100%;
    height:100%;

    border-radius:26px;

    overflow:hidden;

    background:#0d132e;
}

.league-logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.brand-info h1{

    font-size:4rem;

    line-height:.9;

    font-weight:800;

    letter-spacing:-3px;

    background:
    linear-gradient(
    to right,
    #ffffff,
    #ddd6fe,
    #93c5fd);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.brand-info p{

    margin-top:16px;

    color:var(--muted);

    font-size:1rem;

    line-height:1.4;

    letter-spacing:.12em;

    text-transform:uppercase;

    font-weight:700;
}

.header-actions{

    display:flex;
    flex-direction:column;

    gap:18px;

    position:relative;
    z-index:2;
}

.live-badge{

    display:flex;
    align-items:center;
    justify-content:center;

    gap:12px;

    padding:16px 24px;

    border-radius:999px;

    background:
    rgba(34,211,238,.08);

    border:
    1px solid rgba(34,211,238,.2);

    color:#67e8f9;

    font-weight:800;

    font-size:1rem;
}

.live-badge::before{

    content:'';

    width:14px;
    height:14px;

    border-radius:50%;

    background:#22d3ee;

    box-shadow:
    0 0 18px #22d3ee;
}

.referee-btn{

    border:none;

    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:18px;

    padding:24px 28px;

    border-radius:28px;

    background:
    linear-gradient(
    135deg,
    rgba(124,58,237,.30),
    rgba(37,99,235,.25));

    border:
    1px solid rgba(255,255,255,.12);

    color:white;

    font-size:1.1rem;

    font-weight:800;

    transition:.35s ease;
}

.referee-btn:hover{
    transform:translateY(-5px);
}

.ref-icon{

    width:62px;
    height:62px;

    border-radius:20px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:1.7rem;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #2563eb);

    box-shadow:
    0 0 25px rgba(124,58,237,.5);
}

/* SCREEN */

.screen{
    display:none;
}

.screen.active{
    display:block;
}

/* TITLE */

.screen-title{

    font-size:2.2rem;

    font-weight:800;

    margin-bottom:25px;
}

/* BACK */

.btn-back{

    border:none;

    cursor:pointer;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    color:white;

    padding:14px 20px;

    border-radius:999px;

    font-weight:700;

    margin-bottom:25px;
}

/* GRID */

.grid-layout{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:25px;
}

/* CARD */

.card{

    position:relative;

    overflow:hidden;

    background:var(--card);

    border:1px solid var(--card-border);

    backdrop-filter:blur(22px);

    border-radius:32px;

    padding:35px 24px;

    cursor:pointer;

    transition:.35s ease;
}

.card:hover{
    transform:translateY(-8px);
}

.card::before{

    content:'';

    position:absolute;
    inset:0;

    background:
    radial-gradient(
    500px circle at var(--x,0px) var(--y,0px),
    rgba(124,58,237,.16),
    transparent 40%);

    pointer-events:none;
}

.card-icon{

    width:120px;
    height:120px;

    margin:auto auto 25px;

    border-radius:32px;

    overflow:hidden;
}

.card-icon img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card-player-img{

    width:130px;
    height:130px;

    border-radius:50%;

    object-fit:cover;

    margin:auto auto 22px;

    border:4px solid rgba(255,255,255,.08);

    display:block;
}

.card h3{

    font-size:1.8rem;

    text-align:center;

    font-weight:800;

    margin-bottom:10px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.card p{

    text-align:center;

    color:var(--muted);

    font-size:1rem;
}

/* VERIFIED */

.verified-badge{

    width:26px;
    height:26px;

    display:inline-flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(
    145deg,
    #ffdc73,
    #ffb800,
    #ff8400);

    clip-path:polygon(
        50% 0%,
        93% 25%,
        93% 75%,
        50% 100%,
        7% 75%,
        7% 25%
    );

    box-shadow:
    0 0 14px rgba(255,184,0,.8);
}

.verified-badge::before{

    content:'✓';

    color:white;

    font-size:.75rem;

    font-weight:900;
}

/* PROFILE */

.profile-container{

    width:100%;
    max-width:700px;

    margin:auto;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    border-radius:38px;

    padding:50px 35px;

    backdrop-filter:blur(24px);

    text-align:center;
}

.profile-avatar{

    width:170px;
    height:170px;

    border-radius:50%;

    object-fit:cover;

    margin-bottom:25px;
}

.profile-name{

    display:flex;
    align-items:center;
    justify-content:center;

    gap:12px;
}

.profile-container h2{

    font-size:2.7rem;

    font-weight:800;
}

.tag-status{

    display:inline-flex;
    align-items:center;
    gap:10px;

    margin-top:16px;
    margin-bottom:38px;

    padding:12px 18px;

    border-radius:999px;

    background:rgba(16,185,129,.1);

    border:1px solid rgba(16,185,129,.25);

    color:#6ee7b7;

    font-size:.85rem;

    font-weight:700;
}

.profile-info-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:18px;
}

.info-box{

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.06);

    border-radius:24px;

    padding:24px;
}

.info-box label{

    display:block;

    color:var(--muted);

    font-size:.75rem;

    font-weight:800;

    margin-bottom:10px;
}

.info-box p{

    font-size:1.35rem;

    font-weight:800;
}

/* PLAYER BADGE */

.player-badge{

    position:absolute;

    top:18px;
    right:18px;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #2563eb);

    color:white;

    font-size:.75rem;

    font-weight:800;

    padding:8px 12px;

    border-radius:999px;
}

/* RESPONSIVO */

@media(max-width:650px){

    .brand-header{

        flex-direction:column;

        align-items:flex-start;

        padding:35px 24px;
    }

    .brand-left{

        flex-direction:column;

        align-items:flex-start;

        width:100%;
    }

    .brand-info{
        width:100%;
    }

    .brand-info h1{

        font-size:3.2rem;

        line-height:.92;
    }

    .brand-info p{

        font-size:1rem;

        line-height:1.5;

        max-width:100%;

        word-break:break-word;
    }

    .header-actions{

        width:100%;

        flex-direction:column;

        align-items:stretch;
    }

    .live-badge{
        width:100%;
    }

    .referee-btn{

        width:100%;

        justify-content:flex-start;
    }

    .profile-info-grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

</div>

</div>

/* RENDER TEAMS */

function renderTeams(){

const teamsGrid =
document.getElementById("teams-grid");

teamsGrid.innerHTML = "";

Object.keys(database).forEach(teamName=>{

const teamData = database[teamName];

const card =
document.createElement("div");

card.className = "card";

card.onclick = ()=>openTeam(teamName);

card.innerHTML = `

<div class="card-icon">
<img src="${teamData.logo}">
</div>

<h3>${teamName}</h3>

<p>
${teamData.players.length}
Jogadores Ativos
</p>

`;

teamsGrid.appendChild(card);

});

applyGlow();

}

/* OPEN TEAM */

function openTeam(teamName){

currentTeam = teamName;

document.getElementById("team-title")
.innerText = `Elenco — ${teamName}`;

const grid =
document.getElementById("players-grid");

grid.innerHTML = "";

const players =
database[teamName]?.players || [];

players.forEach(player=>{

const verifiedHTML =
player.verified
? `<span class="verified-badge"></span>`
: "";

const card =
document.createElement("div");

card.className = "card";

card.onclick = ()=>openPlayer(player);

card.innerHTML = `

<span class="player-badge">
Nº ${player.number}
</span>

<img src="${player.photo}"
class="card-player-img">

<h3>
${player.name}
${verifiedHTML}
</h3>

<p>
${player.position}
•
${player.room}
</p>

`;

grid.appendChild(card);

});

applyGlow();

changeScreen("screen-players");

}

/* OPEN PLAYER */

function openPlayer(player){

document.getElementById("p-name")
.innerText = player.name;

document.getElementById("p-position")
.innerText = player.position;

document.getElementById("p-room")
.innerText = player.room;

document.getElementById("p-number")
.innerText = player.number;

document.getElementById("p-age")
.innerText = player.age;

document.getElementById("p-photo")
.src = player.photo;

document.getElementById("p-verified")
.innerHTML =
player.verified
? `<span class="verified-badge"></span>`
: "";

document.getElementById(
"btn-back-to-players"
).onclick =
()=>openTeam(currentTeam);

changeScreen("screen-profile");

}

/* REFEREES */

function openReferees(){

<p>${ref.role}</p>

`;

});

}

/* SCREEN */

function changeScreen(screenId){

document.querySelectorAll(".screen")
.forEach(screen=>{

screen.classList.remove("active");

});

document.getElementById(screenId)
.classList.add("active");

}

/* GLOW */

function applyGlow(){

document.querySelectorAll(".card")
.forEach(card=>{

card.onmousemove = function(e){

const rect =
card.getBoundingClientRect();

const x =
e.clientX - rect.left;

const y =
e.clientY - rect.top;

card.style.setProperty(
'--x',
`${x}px`
);

card.style.setProperty(
'--y',
`${y}px`
);

};

});

}

document.addEventListener(

renderTeams
